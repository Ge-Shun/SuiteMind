<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#f3f5f7"/>
  <text x="70" y="76" fill="#17212b" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">SuiteMind icon concepts</text>
  <text x="70" y="111" fill="#687078" font-family="Segoe UI, Arial, sans-serif" font-size="18">Six simple directions designed for Word toolbar sizes</text>

  <!-- 1: interlocking editorial ribbons -->
  <g transform="translate(70 155)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#173a55"/>
    <path d="M115 74c0-13 11-24 24-24h46v31h-39v34h-31V74z" fill="#36a86b"/>
    <path d="M205 163c0 13-11 24-24 24h-46v-31h39v-34h31v41z" fill="#36a86b"/>
    <path d="M146 81h51c13 0 24 11 24 24v19h-31v-12h-44V81z" fill="#55a8dc"/>
    <path d="M190 156h-51c-13 0-24-11-24-24v-19h31v12h44v31z" fill="#f0b83d"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">01  Ribbon S</text>
  </g>

  <!-- 2: document polish -->
  <g transform="translate(440 155)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#2878bd"/>
    <path d="M116 62h67l31 31v81c0 9-7 16-16 16h-82c-9 0-16-7-16-16V78c0-9 7-16 16-16z" fill="#ffffff"/>
    <path d="M183 62v31h31" fill="#dceefa"/>
    <rect x="123" y="106" width="57" height="9" rx="4.5" fill="#2878bd"/>
    <rect x="123" y="128" width="68" height="9" rx="4.5" fill="#2878bd"/>
    <path d="M116 164c25-2 49-10 70-25" fill="none" stroke="#28a66a" stroke-width="13" stroke-linecap="round"/>
    <path d="M195 129l5 10 10 5-10 5-5 10-5-10-10-5 10-5z" fill="#28a66a"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">02  Smart polish</text>
  </g>

  <!-- 3: review first -->
  <g transform="translate(810 155)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#eef4f0"/>
    <path d="M125 70h-22v96h22" fill="none" stroke="#213746" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M195 70h22v96h-22" fill="none" stroke="#213746" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M126 121l25 26 48-54" fill="none" stroke="#23945b" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">03  Review check</text>
  </g>

  <!-- 4: precise insertion -->
  <g transform="translate(70 475)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#15545b"/>
    <rect x="110" y="73" width="67" height="13" rx="6.5" fill="#ffffff"/>
    <rect x="110" y="101" width="90" height="13" rx="6.5" fill="#ffffff"/>
    <rect x="110" y="129" width="54" height="13" rx="6.5" fill="#ffffff"/>
    <rect x="177" y="65" width="10" height="92" rx="5" fill="#ff745f"/>
    <circle cx="182" cy="164" r="8" fill="#ff745f"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">04  Text cursor</text>
  </g>

  <!-- 5: before and after -->
  <g transform="translate(440 475)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#263746"/>
    <rect x="104" y="72" width="62" height="88" rx="8" fill="#9aa9b4"/>
    <rect x="154" y="58" width="62" height="106" rx="8" fill="#ffffff"/>
    <rect x="170" y="82" width="30" height="8" rx="4" fill="#2e8bc0"/>
    <rect x="170" y="102" width="30" height="8" rx="4" fill="#2e8bc0"/>
    <rect x="170" y="122" width="23" height="8" rx="4" fill="#2e8bc0"/>
    <path d="M116 177h83" stroke="#36a86b" stroke-width="10" stroke-linecap="round"/>
    <path d="M191 165l16 12-16 12z" fill="#36a86b"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">05  Before / after</text>
  </g>

  <!-- 6: pen and approval -->
  <g transform="translate(810 475)">
    <rect width="320" height="270" rx="18" fill="#ffffff" stroke="#dfe3e7"/>
    <rect x="70" y="28" width="180" height="180" rx="42" fill="#f6f0df"/>
    <path d="M160 58l45 45-45 72-45-72z" fill="#225c78"/>
    <path d="M160 58v74" stroke="#f6f0df" stroke-width="10"/>
    <circle cx="160" cy="137" r="12" fill="#f6f0df"/>
    <path d="M118 166l20 20 45-45" fill="none" stroke="#2a9a61" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="205" cy="75" r="12" fill="#e8ae31"/>
    <text x="160" y="245" text-anchor="middle" fill="#43505b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">06  Pen approval</text>
  </g>
</svg>
