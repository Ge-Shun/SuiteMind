name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check formatting
        run: npm run format:check

      - name: Check types
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build production artifacts
        run: npm run build

      - name: Validate Office manifest
        run: npm run validate:manifest -w @suitemind/word-addin

  connector:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build Windows connector
        shell: pwsh
        run: ./scripts/publish-connector.ps1
