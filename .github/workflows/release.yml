name: Release SuiteMind

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  contents: write

jobs:
  connector:
    runs-on: windows-latest
    outputs:
      signed: ${{ steps.signing.outputs.enabled }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Release tag '$tag' must use the format v1.2.3."
          }
          $version = $tag.Substring(1)
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($version -ne $packageVersion) {
            throw "Release tag version '$version' does not match package.json version '$packageVersion'."
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check connector signing configuration
        id: signing
        shell: pwsh
        env:
          SIGNPATH_ENABLED: ${{ vars.SIGNPATH_ENABLED }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $enabled = $env:SIGNPATH_ENABLED -eq "true"
          if ($enabled) {
            $required = @{
              SIGNPATH_API_TOKEN = $env:SIGNPATH_API_TOKEN
              SIGNPATH_ORGANIZATION_ID = $env:SIGNPATH_ORGANIZATION_ID
              SIGNPATH_PROJECT_SLUG = $env:SIGNPATH_PROJECT_SLUG
              SIGNPATH_SIGNING_POLICY_SLUG = $env:SIGNPATH_SIGNING_POLICY_SLUG
              SIGNPATH_ARTIFACT_CONFIGURATION_SLUG = $env:SIGNPATH_ARTIFACT_CONFIGURATION_SLUG
            }
            $missing = @($required.Keys | Where-Object { [string]::IsNullOrWhiteSpace($required[$_]) })
            if ($missing.Count -gt 0) {
              throw "SignPath is enabled but these repository settings are missing: $($missing -join ', ')"
            }
          } else {
            Write-Warning "SignPath is not enabled. This release will contain an unsigned connector."
          }
          "enabled=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Build Windows connector
        shell: pwsh
        run: ./scripts/publish-connector.ps1 -Version "${{ steps.version.outputs.version }}" -SkipArchive

      - name: Upload unsigned connector for signing
        if: steps.signing.outputs.enabled == 'true'
        id: upload-unsigned-connector
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/connector/publish/SuiteMindConnector.exe
          archive: false
          if-no-files-found: error
          retention-days: 1

      - name: Sign connector with SignPath
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-connector.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/connector/signed
          skip-decompress: true

      - name: Install signed connector
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signedFiles = @(Get-ChildItem artifacts/connector/signed -Recurse -Filter SuiteMindConnector.exe)
          if ($signedFiles.Count -ne 1) {
            throw "Expected exactly one signed SuiteMindConnector.exe, found $($signedFiles.Count)."
          }
          Copy-Item -LiteralPath $signedFiles[0].FullName -Destination artifacts/connector/publish/SuiteMindConnector.exe -Force

      - name: Package signed connector
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: ./scripts/package-connector.ps1 -ArchivePath "artifacts/release/SuiteMind-Connector-${{ github.ref_name }}-win-x64.zip" -RequireSignature

      - name: Package unsigned connector
        if: steps.signing.outputs.enabled != 'true'
        shell: pwsh
        run: ./scripts/package-connector.ps1 -ArchivePath "artifacts/release/SuiteMind-Connector-${{ github.ref_name }}-win-x64.zip"

      - name: Generate connector checksum
        shell: pwsh
        run: ./scripts/write-sha256.ps1 -Path "artifacts/release/SuiteMind-Connector-${{ github.ref_name }}-win-x64.zip"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: artifacts/release/*
          if-no-files-found: error

  release:
    needs: connector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Generate production manifest
        env:
          SUITEMIND_ADDIN_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          SUITEMIND_ADDIN_ORIGIN: https://${{ github.repository_owner }}.github.io
          SUITEMIND_SUPPORT_URL: https://github.com/${{ github.repository }}
          SUITEMIND_MANIFEST_OUTPUT: release-assets/SuiteMind-manifest.xml
        run: node scripts/generate-production-manifest.mjs

      - name: Verify and index release assets
        working-directory: release-assets
        run: |
          sha256sum -c SuiteMind-Connector-${{ github.ref_name }}-win-x64.zip.sha256
          sha256sum SuiteMind-Connector-${{ github.ref_name }}-win-x64.zip SuiteMind-manifest.xml > SHA256SUMS.txt

      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
          CONNECTOR_SIGNED: ${{ needs.connector.outputs.signed }}
        run: |
          {
            echo "## Installation"
            echo
            echo "- Download \`SuiteMind-manifest.xml\` to install the Word add-in."
            echo "- Download \`SuiteMind-Connector-${GITHUB_REF_NAME}-win-x64.zip\` only when Word cannot connect directly to the model provider."
            echo "- Verify downloaded files against \`SHA256SUMS.txt\`."
            echo
            if [ "$CONNECTOR_SIGNED" = "true" ]; then
              echo "> The Windows connector in this release has a verified Authenticode signature."
            else
              echo "> [!WARNING]"
              echo "> The Windows connector in this release is not code-signed. Windows SmartScreen may show Unknown publisher. Verify the SHA-256 checksum and download only from this GitHub repository."
            fi
            echo
          } > release-notes.md
          gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" --jq '.body' >> release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --verify-tag \
            --title "SuiteMind ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
