name: Deploy Word Add-in to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Actions runners are moving off Node 20; use Node 24 for npm scripts.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test Word add-in
        run: npm test --workspace @suitemind/word-addin

      - name: Typecheck Word add-in
        run: npm run typecheck --workspace @suitemind/word-addin

      - name: Require dedicated add-in domain
        env:
          SUITEMIND_ADDIN_DOMAIN: ${{ vars.SUITEMIND_ADDIN_DOMAIN }}
        run: |
          if [ -z "$SUITEMIND_ADDIN_DOMAIN" ]; then
            echo "Set the SUITEMIND_ADDIN_DOMAIN repository variable to a dedicated hostname, for example word.example.com."
            exit 1
          fi

      - name: Build Word add-in for custom domain
        env:
          VITE_ADDIN_BASE_PATH: /
        run: npm run build --workspace @suitemind/word-addin

      - name: Generate production manifest
        env:
          SUITEMIND_ADDIN_URL: https://${{ vars.SUITEMIND_ADDIN_DOMAIN }}
          SUITEMIND_ADDIN_ORIGIN: https://${{ vars.SUITEMIND_ADDIN_DOMAIN }}
          SUITEMIND_SUPPORT_URL: https://github.com/${{ github.repository }}
        run: npm run generate:production-manifest

      - name: Configure custom domain artifact
        env:
          SUITEMIND_ADDIN_DOMAIN: ${{ vars.SUITEMIND_ADDIN_DOMAIN }}
        run: printf '%s\n' "$SUITEMIND_ADDIN_DOMAIN" > apps/word-addin/dist/CNAME

      # enablement:true lets the first run create/enable the Pages site automatically.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/word-addin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
