name: Deploy Word Add-in to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  connector:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Check connector signing configuration
        id: signing
        shell: pwsh
        env:
          SIGNPATH_ENABLED: ${{ vars.SIGNPATH_ENABLED }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $enabled = $env:SIGNPATH_ENABLED -eq "true"
          if ($enabled) {
            $required = @{
              SIGNPATH_API_TOKEN = $env:SIGNPATH_API_TOKEN
              SIGNPATH_ORGANIZATION_ID = $env:SIGNPATH_ORGANIZATION_ID
              SIGNPATH_PROJECT_SLUG = $env:SIGNPATH_PROJECT_SLUG
              SIGNPATH_SIGNING_POLICY_SLUG = $env:SIGNPATH_SIGNING_POLICY_SLUG
              SIGNPATH_ARTIFACT_CONFIGURATION_SLUG = $env:SIGNPATH_ARTIFACT_CONFIGURATION_SLUG
            }
            $missing = @($required.Keys | Where-Object { [string]::IsNullOrWhiteSpace($required[$_]) })
            if ($missing.Count -gt 0) {
              throw "SignPath is enabled but these repository settings are missing: $($missing -join ', ')"
            }
          } else {
            Write-Warning "SignPath is not enabled. This deployment will contain an unsigned connector."
          }
          "enabled=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Build Windows connector
        shell: pwsh
        run: ./scripts/publish-connector.ps1 -SkipArchive

      - name: Upload unsigned connector for signing
        if: steps.signing.outputs.enabled == 'true'
        id: upload-unsigned-connector
        uses: actions/upload-artifact@v7
        with:
          name: suitemind-connector-unsigned
          path: artifacts/connector/publish/SuiteMindConnector.exe
          archive: false
          if-no-files-found: error
          retention-days: 1

      - name: Sign connector with SignPath
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-connector.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/connector/signed
          skip-decompress: true

      - name: Install signed connector
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signedFiles = @(Get-ChildItem artifacts/connector/signed -Recurse -Filter SuiteMindConnector.exe)
          if ($signedFiles.Count -ne 1) {
            throw "Expected exactly one signed SuiteMindConnector.exe, found $($signedFiles.Count)."
          }
          Copy-Item -LiteralPath $signedFiles[0].FullName -Destination artifacts/connector/publish/SuiteMindConnector.exe -Force

      - name: Package signed connector
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: ./scripts/package-connector.ps1 -RequireSignature

      - name: Package unsigned connector
        if: steps.signing.outputs.enabled != 'true'
        shell: pwsh
        run: ./scripts/package-connector.ps1

      - name: Upload connector package
        uses: actions/upload-artifact@v4
        with:
          name: suitemind-connector
          path: artifacts/connector/SuiteMind-Connector-win-x64.zip
          if-no-files-found: error

  build:
    needs: connector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # GitHub Actions runners are moving off Node 20; use Node 24 for npm scripts.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test Word add-in
        run: npm test --workspace @suitemind/word-addin

      - name: Typecheck Word add-in
        run: npm run typecheck --workspace @suitemind/word-addin

      - name: Run Word add-in browser E2E
        run: npm run e2e:word

      - name: Build Word add-in for GitHub Project Pages
        env:
          VITE_ADDIN_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build --workspace @suitemind/word-addin

      - name: Generate production manifest
        env:
          SUITEMIND_ADDIN_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          SUITEMIND_ADDIN_ORIGIN: https://${{ github.repository_owner }}.github.io
          SUITEMIND_SUPPORT_URL: https://github.com/${{ github.repository }}
        run: npm run generate:production-manifest

      - name: Verify installation artifacts
        run: |
          test -f apps/word-addin/dist/install.html
          test -f apps/word-addin/dist/manifest.xml

      - name: Download Windows connector
        uses: actions/download-artifact@v4
        with:
          name: suitemind-connector
          path: apps/word-addin/dist/downloads

      - name: Verify connector artifact
        run: test -f apps/word-addin/dist/downloads/SuiteMind-Connector-win-x64.zip

      - name: Validate production manifest
        run: npx office-addin-manifest validate apps/word-addin/dist/manifest.xml

      # enablement:true lets the first run create/enable the Pages site automatically.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/word-addin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
